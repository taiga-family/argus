name: 🤖 PR is ready to merge
on:
    pull_request_review:
        types: [submitted]

jobs:
    label-when-approved:
        name: Label when approved
        runs-on: ubuntu-latest
        if: github.event.review.state == 'approved'
        steps:
            - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
            - uses: taiga-family/ci/actions/setup/variables@e9c5cd341c28d9aeb357b757df41cddcbb674b2d # v1.222.0
            - uses: taiga-family/ci/actions/auto/label-when-approved@e9c5cd341c28d9aeb357b757df41cddcbb674b2d # v1.222.0
              with:
                  approvals: 1
                  token: ${{ secrets.GITHUB_TOKEN }}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
