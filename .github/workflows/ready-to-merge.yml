name: 🤖 PR is ready to merge
on:
    pull_request_review:
        types: [submitted]

jobs:
    label-when-approved:
        name: Label when approved
        runs-on: ubuntu-latest
        if: github.event.review.state == 'approved'
        steps:
            - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
            - uses: taiga-family/ci/actions/setup/variables@a6230c2ffdf53253580ec058dd4faccdb01ac85a # v2.4.0
            - uses: taiga-family/ci/actions/auto/label-when-approved@a6230c2ffdf53253580ec058dd4faccdb01ac85a # v2.4.0
              with:
                  approvals: 1
                  token: ${{ secrets.GITHUB_TOKEN }}

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
