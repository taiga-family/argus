name: ⚙️ Build

on:
    pull_request:
    push:
        branches: [main]

jobs:
    build:
        name: Build
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
            - uses: taiga-family/ci/actions/setup/node@a581d05631ddf95b3aa5d391c3e472c538641620 # v1.211.0
            - run: npm run build

concurrency:
    group: build-${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true
